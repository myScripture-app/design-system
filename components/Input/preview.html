<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>myScripture — Input</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --background: rgb(249 248 246); --foreground: rgb(33 35 44);
      --card: rgb(253 253 252); --muted-fg: rgb(108 112 127);
      --border-color: rgb(226 222 217); --primary: rgb(70 114 93);
      --sage-light: rgb(231 239 235); --shadow-sm: 0 1px 4px rgba(56,48,35,0.06);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--background); color: var(--foreground); font-family: 'DM Sans', system-ui, sans-serif; padding: 48px 24px; max-width: 560px; margin: 0 auto; }
    h1 { font-family: 'Lora', Georgia, serif; font-weight: 600; font-size: 2rem; letter-spacing: -0.015em; margin-bottom: 8px; }
    .subtitle { color: var(--muted-fg); font-size: 15px; margin-bottom: 48px; }
    .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--primary); margin-bottom: 16px; margin-top: 36px; }
    .field { margin-bottom: 24px; }
    label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; }
    .helper { font-size: 12px; color: var(--muted-fg); margin-top: 5px; }
    .error-msg { font-size: 12px; color: #DC2626; margin-top: 5px; }
    input, textarea, select {
      width: 100%; background: var(--card); border: 1px solid var(--border-color);
      border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', system-ui, sans-serif;
      font-size: 14px; color: var(--foreground); outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      box-shadow: var(--shadow-sm);
    }
    input:focus, textarea:focus, select:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(70,114,93,0.12);
    }
    input.error { border-color: #DC2626; }
    input.error:focus { box-shadow: 0 0 0 3px rgba(220,38,38,0.12); }
    input:disabled, textarea:disabled { opacity: 0.5; cursor: not-allowed; }
    textarea { resize: vertical; min-height: 100px; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; }
    input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--primary); cursor: pointer; }
  </style>
</head>
<body>
  <p class="section-label">Components</p>
  <h1>Input</h1>
  <p class="subtitle">Card-white background, warm border, sage focus ring.</p>

  <p class="section-label">Text Input</p>
  <div class="field">
    <label for="passage">Scripture passage</label>
    <input id="passage" type="text" placeholder="e.g. John 3:16–17">
    <p class="helper">Book Chapter:Verse format</p>
  </div>

  <div class="field">
    <label for="email">Email address</label>
    <input id="email" type="email" value="riki@example.com" class="error">
    <p class="error-msg">Please enter a valid email address.</p>
  </div>

  <div class="field">
    <label for="name">Name (disabled)</label>
    <input id="name" type="text" value="Riki Morohashi" disabled>
  </div>

  <p class="section-label">Textarea</p>
  <div class="field">
    <label for="note">Sermon note</label>
    <textarea id="note" placeholder="What did God show you today?"></textarea>
  </div>

  <p class="section-label">Select</p>
  <div class="field">
    <label for="series">Series</label>
    <select id="series">
      <option>Select a series…</option>
      <option>Sermon on the Mount</option>
      <option>The Gospel of John</option>
    </select>
  </div>

  <p class="section-label">Checkbox</p>
  <div class="field">
    <div class="checkbox-row">
      <input type="checkbox" id="agree" checked>
      <label for="agree" style="margin:0">I read this passage today</label>
    </div>
  </div>
</body>
</html>
